<div class="dashboard-wrapper">
  <div class="admin-dashboard">
    <div class="dashboard-header">
      <span class="section-tag">Management</span>
      <h1>Admin Dashboard</h1>
      <p class="subtitle">Welcome back! Here is your business overview for today.</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">💊</div>
        <h3>Total Medicines</h3>
        <p class="count">{{ totalMedicines }}</p>
        <div class="card-progress"></div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <h3>Total Orders</h3>
        <p class="count">{{ totalOrders }}</p>
        <div class="card-progress"></div>
      </div>
    </div>

    <div class="admin-actions">
      <a routerLink="/admin/add-medicine" class="action-btn">
        <span class="icon">➕</span> Add Medicine
      </a>
      <a routerLink="/admin/medicines" class="action-btn">
        <span class="icon">⚙️</span> Manage Medicines
      </a>
      <a routerLink="/admin/orders" class="action-btn">
        <span class="icon">📦</span> View Orders
      </a>
      <button (click)="logout()" class="action-btn logout">
        <span class="icon">🚪</span> Logout
      </button>
    </div>
  </div>
</div>
