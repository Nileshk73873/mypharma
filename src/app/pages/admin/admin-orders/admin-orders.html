<div class="admin-orders">

  <div class="page-header">
    <h1>Manage Orders</h1>
    <a routerLink="/admin/dashboard" class="back-btn">← Dashboard</a>
  </div>

  <div class="loading" *ngIf="isLoading">Loading orders...</div>

  <div class="table-wrap" *ngIf="!isLoading">
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>#{{ order.id }}</td>
          <td>{{ order.customer }}</td>
          <td>{{ order.email }}</td>
          <td>₹{{ order.total_amount }}</td>
          <td>{{ order.created_at | date:'dd MMM yyyy' }}</td>
          <td>
            <span class="status-badge"
  [ngClass]="{
    'pending':    order.status === 'Pending',
    'processing': order.status === 'Processing',
    'delivered':  order.status === 'Delivered',
    'cancelled':  order.status === 'Cancelled'
  }">
  {{ order.status }}
</span>
          </td>
          <td>
            <select
  [(ngModel)]="order.status"
  (change)="updateStatus(order.id, order.status)"
  class="status-select">
  <option>Pending</option>
  <option>Processing</option>
  <option>Delivered</option>
  <option>Cancelled</option>
</select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
