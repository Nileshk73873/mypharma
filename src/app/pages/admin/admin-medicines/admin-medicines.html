<div class="admin-medicines">

  <div class="page-header">
    <h1>Manage Medicines</h1>
    <a routerLink="/admin/add-medicine" class="add-btn">+ Add Medicine</a>
    <a routerLink="/admin/dashboard" class="back-link">← Back to Dashboard</a>
  </div>

  <!-- Loading -->
  <div class="loading" *ngIf="isLoading">Loading medicines...</div>

  <!-- Table -->
  <div class="table-wrap" *ngIf="!isLoading">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Expiry</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let med of medicines"
            [class.low-stock]="med.stock < 10">
          <td>{{ med.name }}</td>
          <td>{{ med.category }}</td>
          <td>₹{{ med.price }}</td>
          <td>
            <span [class.warning]="med.stock < 10">
              {{ med.stock < 10 ? '⚠️ ' : '' }}{{ med.stock }}
            </span>
          </td>
          <td>{{ med.expiry_date | date:'dd MMM yyyy' }}</td>
          <td class="actions">
            <button class="edit-btn"   (click)="openEdit(med)">Edit</button>
            <button class="delete-btn" (click)="deleteMedicine(med.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" *ngIf="editMode">
    <div class="modal">
      <h2>Edit Medicine</h2>

      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="selectedMed.name" class="form-input" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" [(ngModel)]="selectedMed.category" class="form-input" />
      </div>
      <div class="form-group">
        <label>Price</label>
        <input type="number" [(ngModel)]="selectedMed.price" class="form-input" />
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" [(ngModel)]="selectedMed.stock" class="form-input" />
      </div>
      <div class="form-group">
        <label>Expiry Date</label>
        <input type="date" [(ngModel)]="selectedMed.expiry_date" class="form-input" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" [(ngModel)]="selectedMed.description" class="form-input" />
      </div>

      <div class="modal-actions">
        <button class="save-btn"   (click)="saveEdit()">Save</button>
        <button class="cancel-btn" (click)="closeEdit()">Cancel</button>
      </div>
    </div>
  </div>

</div>
