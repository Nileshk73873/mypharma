<div class="login-page">
  <div class="login-card">
    <h2>Welcome to MyPharma</h2>
    <p>Please login to start shopping</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" required placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="login-btn">Login</button>
      
     <div class="login-footer">
  <p>Admin? <a routerLink="/admin-login">Go to Admin Portal</a></p>
</div>
    </form>
  </div>
</div>
