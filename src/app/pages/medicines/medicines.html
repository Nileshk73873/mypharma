<div class="medicines-page">

  <!-- Header -->
  <div class="page-header">
    <p class="subtitle">PHARMACY</p>
    <h1>Available Medicines</h1>
    <p class="desc">Browse our wide range of 100% genuine healthcare products.</p>
  </div>

  <!-- Success message -->
  <div class="success-msg" *ngIf="message">{{ message }}</div>

  <!-- Loading state -->
  <div class="loading" *ngIf="isLoading">
    <p>Loading medicines...</p>
  </div>

  <!-- Medicines Grid — only shows after loading is done -->
  <div class="medicines-grid" *ngIf="!isLoading && medicines.length > 0">
    <div class="medicine-card" *ngFor="let med of medicines">
      <div class="card-body">
        <span class="category-badge">{{ med.category }}</span>
        <h3 class="med-name">{{ med.name }}</h3>
        <p class="med-desc">{{ med.description }}</p>
        <div class="card-footer">
          <div class="price-stock">
            <span class="price">₹{{ med.price }}</span>
            <span class="stock" [class.low]="med.stock < 10">
              {{ med.stock < 10 ? '⚠️ Low Stock' : 'In Stock' }}
            </span>
          </div>
          <button
            class="add-btn"
            (click)="addToCart(med)"
            [disabled]="med.stock === 0">
            {{ med.stock === 0 ? 'Out of Stock' : 'Add to Cart' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state — only shows after loading, if truly empty -->
  <div class="empty" *ngIf="!isLoading && medicines.length === 0">
    <p>No medicines available right now.</p>
  </div>

</div>
